<html lang="en">
  <head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=devive-width, initially scale=1.0">
       <title>Link Analyzer</title>
  <link rel="stylesheet" href="style.css" />
      <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Syne for headings, DM Mono for data -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Lucide icons via CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body>
     <!-- ===================== BACKGROUND EFFECTS ===================== -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
     <!-- ===================== HEADER ===================== -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon"><i data-lucide="scan-search"></i></span>
      <span class="logo-text">LinkAnalyzer</span>
    </div>
    <span class="badge">v1.0</span>
  </header>
    <!-- ==================== HERO SECTION ==================== -->
  <main>
    <section class="hero" id="home-section">

      <div class="hero-tag">🔍 Deep URL Analysis</div>

      <h1 class="hero-title">
        Inspect Any<br />
        <span class="gradient-text">Website Instantly</span>
      </h1>

      <p class="hero-subtitle">
        Enter a URL below to extract SEO data, metadata, load time,<br />
        IP address, and much more — all in seconds.
      </p>
       <!-- URL INPUT FORM -->
      <div class="input-wrapper">
        <div class="input-icon"><i data-lucide="link"></i></div>
        <input
          type="text"
          id="urlInput"
          class="url-input"
          placeholder="https://example.com"
          autocomplete="off"
          spellcheck="false"
        />
       <!-- Analyze button triggers the JS function -->
        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeURL()">
          <span class="btn-text">Analyze</span>
          <span class="btn-icon"><i data-lucide="arrow-right"></i></span>
        </button>
      </div>  
  </body>
</html>
